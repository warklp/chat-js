name: Playwright

on:
  pull_request:

concurrency:
  group: playwright-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # These secrets are optional in CI: Playwright falls back to safe test
      # defaults when they are unset so the anonymous e2e suite can still boot.
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check affected
        id: affected
        shell: bash
        env:
          TURBO_SCM_BASE: ${{ github.event.pull_request.base.sha }}
          TURBO_SCM_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          TURBO_VERSION="$(node -p "require('./package.json').devDependencies.turbo")"
          if npx -y "turbo@${TURBO_VERSION}" query affected --tasks test:e2e --exit-code >/tmp/playwright-query.json 2>/tmp/playwright-query.log; then
            echo "run=false" >>"$GITHUB_OUTPUT"
          else
            status=$?
            if [ "$status" -eq 1 ]; then
              echo "run=true" >>"$GITHUB_OUTPUT"
            else
              cat /tmp/playwright-query.log
              cat /tmp/playwright-query.json
              exit "$status"
            fi
          fi
      - uses: oven-sh/setup-bun@v2
        if: steps.affected.outputs.run == 'true'
        with:
          bun-version: 1.3.1
      - uses: actions/cache@v4
        if: steps.affected.outputs.run == 'true'
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - if: steps.affected.outputs.run == 'true'
        run: bun install --frozen-lockfile
      - uses: actions/cache@v4
        if: steps.affected.outputs.run == 'true'
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/bun.lock') }}
      - name: Install Playwright browsers
        if: steps.affected.outputs.run == 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: apps/chat/node_modules/.bin/playwright install --with-deps chromium
      - if: steps.affected.outputs.run == 'true'
        env:
          TURBO_SCM_BASE: ${{ github.event.pull_request.base.sha }}
          TURBO_SCM_HEAD: ${{ github.event.pull_request.head.sha }}
        run: bunx turbo run test:e2e --affected
      - uses: actions/upload-artifact@v4
        if: steps.affected.outputs.run == 'true' && always() && !cancelled()
        with:
          name: playwright-report
          path: apps/chat/playwright-report/
          retention-days: 7
