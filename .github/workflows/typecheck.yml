name: Typecheck

on:
  pull_request:

concurrency:
  group: typecheck-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check affected
        id: affected
        shell: bash
        env:
          TURBO_SCM_BASE: ${{ github.event.pull_request.base.sha }}
          TURBO_SCM_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          TURBO_VERSION="$(node -p "require('./package.json').devDependencies.turbo")"
          if npx -y "turbo@${TURBO_VERSION}" query affected --tasks test:types --exit-code >/tmp/typecheck-query.json 2>/tmp/typecheck-query.log; then
            echo "run=false" >>"$GITHUB_OUTPUT"
          else
            status=$?
            if [ "$status" -eq 1 ]; then
              echo "run=true" >>"$GITHUB_OUTPUT"
            else
              cat /tmp/typecheck-query.log
              cat /tmp/typecheck-query.json
              exit "$status"
            fi
          fi
      - uses: oven-sh/setup-bun@v2
        if: steps.affected.outputs.run == 'true'
        with:
          bun-version: 1.3.1
      - uses: actions/cache@v4
        if: steps.affected.outputs.run == 'true'
        with:
          path: |
            ~/.bun
            **/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - if: steps.affected.outputs.run == 'true'
        run: bun install --frozen-lockfile
      - if: steps.affected.outputs.run == 'true'
        run: bunx turbo run test:types --affected
